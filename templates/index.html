<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AWS - Razal Edition</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
    body { background: #131314; color: #e8eaed; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #3c4043; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 500; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #8b5cf6, #10a37f); border-radius: 8px; display: grid; place-items: center; font-weight: 700; color: white; }
    .content { flex: 1; overflow-y: auto; padding: 20px 16px; }
    .query-bubble { background: #2d2e30; padding: 12px 16px; border-radius: 20px; width: fit-content; margin-left: auto; margin-bottom: 20px; max-width: 85%; }
    .ai-response { margin-bottom: 25px; animation: fadeIn 0.4s ease; }
    .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; color: #8b5cf6; font-weight: 500; }
    .bottom-section { padding: 12px 16px; background: #131314; border-top: 1px solid #3c4043; }
    .input-bar { background: #2d2e30; border: 1px solid #3c4043; border-radius: 28px; padding: 8px 16px; display: flex; align-items: center; gap: 12px; }
    .input-bar input { flex: 1; background: none; border: none; outline: none; color: #e8eaed; font-size: 16px; }
    
    /* Logo Animation */
    .aws-searching { display: flex; align-items: center; gap: 12px; color: #9aa0a6; font-size: 14px; margin-bottom: 15px; }
    .logo-container { position: relative; width: 20px; height: 20px; }
    .logo-swap { position: absolute; width: 100%; height: 100%; opacity: 0; animation: logoFade 3s infinite; }
    .logo-swap:nth-child(2) { animation-delay: 1.5s; }
    @keyframes logoFade { 0% { opacity: 0; } 20% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="logo"><div class="logo-icon">A</div><span>Aira Web Search</span></div>
    <div style="width:32px; height:32px; background:#8b5cf6; border-radius:50%;"></div>
  </div>
  <div class="content" id="chatContent">
    <div class="ai-response">
      <div class="ai-header"><span>✦</span> AWS</div>
      <div>ഹലോ റസൽ ബോസ്സ്, ഞാൻ റെഡിയാണ്! എന്താണ് വെബ്ബിൽ തിരയേണ്ടത്?</div>
    </div>
  </div>
  <div class="bottom-section">
    <div class="input-bar">
      <input type="text" placeholder="AWS search..." id="userInput">
      <span class="material-symbols-outlined" style="color:#8b5cf6; cursor:pointer;" onclick="makeSearch()">send</span>
    </div>
  </div>
  <script>
    async function makeSearch() {
      const input = document.getElementById('userInput');
      const content = document.getElementById('chatContent');
      const query = input.value.trim();
      if (!query) return;
      input.value = '';
      content.innerHTML += `<div class="query-bubble">${query}</div>`;
      const searchId = "search-" + Date.now();
      content.innerHTML += `
        <div class="aws-searching" id="${searchId}">
          <div class="logo-container">
            <img src="https://www.google.com/favicon.ico" class="logo-swap">
            <img src="https://duckduckgo.com/favicon.ico" class="logo-swap">
          </div>
          <span>AWS is fetching results...</span>
        </div>`;
      content.scrollTop = content.scrollHeight;
      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ message: query })
        });
        const data = await response.json();
        document.getElementById(searchId).remove();
        content.innerHTML += `
          <div class="ai-response">
            <div class="ai-header"><span>✦</span> AWS Results</div>
            <div style="line-height:1.6;">${data.reply}</div>
          </div>`;
        content.scrollTop = content.scrollHeight;
      } catch (e) { document.getElementById(searchId).innerHTML = "Error."; }
    }
  </script>
</body>
</html>
